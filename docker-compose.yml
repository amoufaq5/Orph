version: "3.8"

services:
  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    image: orph/studio:dev
    environment:
      - ORPH_CLOUD_BACKEND=local
      - FLASK_ENV=development
    ports:
      - "5055:5055"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./src:/app/src
      - ./README.md:/app/README.md:ro
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    image: orph/inference:dev
    environment:
      - ORPH_INFER_MODEL_DIR=/app/outputs/user_models/demo/latest
      - ORPH_INFER_TOKENIZER_DIR=/app/outputs/tokenizer/orph_bpe_32k
      - ORPH_INFER_MAX_NEW_TOKENS=256
    ports:
      - "6060:6060"
    volumes:
      - ./outputs:/app/outputs
      - ./src:/app/src
    restart: unless-stopped

  # Optional: run the React UI dev server inside Docker
  ui:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_INFER_URL=http://inference:6060
    volumes:
      - ./ui:/app
    depends_on:
      - inference
    restart: unless-stopped